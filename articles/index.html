---
layout: default
title: Articles
description: Articles at www.goetz.pro
---

{% if site.posts and site.posts.size != 0 %}
  <ul>
    {% for post in site.posts %}
      <li>
        <a href="{{ post.url }}">{{ post.title }}</a>
        <span class="info">({{ post.date | date: "%-d %B %Y" }})</span>
      </li>
    {% endfor %}
  </ul>
{% else %}
  <p class="info">No articles to display.</p>
{% endif %}

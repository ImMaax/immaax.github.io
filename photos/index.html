---
layout: default
title: Photos
description: Photos at www.goetz.pro
---

<h3>Photos</h3>

{% if site.categories.photos and site.categories.photos.size != 0 %}
  <div id="photo-grid">
    {% for post in site.categories.photos %}
      <a href="{{ post.url }}">
        <img src="/assets/img/photos/{{ post.photo }}" class="photo-grid-img" alt="{{ post.description }}" title="{{ post.description }}">
      </a>
    {% endfor %}
  </div>
{% else %}
  <p class="info">No photos to display.</p>
{% endif %}
